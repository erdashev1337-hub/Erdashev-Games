<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Ilon O'yini</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@700;900&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    background: #0a1628;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; font-family: 'Nunito', sans-serif; color: #fff;
    overflow: hidden;
    background-image: radial-gradient(ellipse at 50% 0%, #0d2a1a 0%, #0a1628 60%);
  }
  h1 {
    font-family: 'Press Start 2P', monospace;
    font-size: 14px; color: #10b981;
    text-shadow: 0 0 20px #10b981;
    margin-bottom: 10px;
    letter-spacing: 2px;
  }
  #scoreboard {
    display: flex; gap: 24px; margin-bottom: 12px;
  }
  .score-box {
    background: rgba(16,185,129,0.1);
    border: 1px solid rgba(16,185,129,0.3);
    border-radius: 10px; padding: 6px 16px;
    text-align: center;
  }
  .score-label { font-size: 10px; color: #6b7280; }
  .score-val { font-family: 'Press Start 2P', monospace; font-size: 14px; color: #10b981; }

  canvas {
    border: 2px solid rgba(16,185,129,0.4);
    border-radius: 12px;
    box-shadow: 0 0 30px rgba(16,185,129,0.2);
    display: block;
  }

  #overlay {
    position: fixed; inset: 0;
    background: rgba(10,22,40,0.92);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px; z-index: 10;
  }
  #overlay h2 {
    font-family: 'Press Start 2P', monospace;
    font-size: 20px; color: #10b981;
    text-shadow: 0 0 20px #10b981;
  }
  #overlay p { color: #9ca3af; font-size: 13px; text-align: center; }
  #overlay .final { font-family: 'Press Start 2P', monospace; font-size: 16px; color: #fff; }

  .btn {
    background: #10b981; color: #000; font-family: 'Press Start 2P', monospace;
    font-size: 10px; border: none; border-radius: 10px;
    padding: 14px 28px; cursor: pointer;
    box-shadow: 0 0 20px rgba(16,185,129,0.5);
    transition: transform 0.1s;
  }
  .btn:active { transform: scale(0.95); }

  /* D-PAD */
  #dpad {
    display: grid;
    grid-template-columns: 50px 50px 50px;
    grid-template-rows: 50px 50px 50px;
    gap: 4px; margin-top: 14px;
  }
  .dpad-btn {
    background: rgba(16,185,129,0.15);
    border: 1px solid rgba(16,185,129,0.3);
    border-radius: 10px; color: #10b981;
    font-size: 20px; display: flex;
    align-items: center; justify-content: center;
    cursor: pointer; user-select: none;
    transition: background 0.1s;
  }
  .dpad-btn:active { background: rgba(16,185,129,0.4); }
  .dpad-center { background: transparent; border: none; pointer-events: none; }
</style>
</head>
<body>
<h1>🐍 ILON</h1>
<div id="scoreboard">
  <div class="score-box"><div class="score-label">BALL</div><div class="score-val" id="score">0</div></div>
  <div class="score-box"><div class="score-label">REKORD</div><div class="score-val" id="best">0</div></div>
</div>
<canvas id="c"></canvas>
<div id="dpad">
  <div></div>
  <div class="dpad-btn" id="up">▲</div>
  <div></div>
  <div class="dpad-btn" id="left">◀</div>
  <div class="dpad-center"></div>
  <div class="dpad-btn" id="right">▶</div>
  <div></div>
  <div class="dpad-btn" id="down">▼</div>
  <div></div>
</div>

<div id="overlay">
  <h2>🐍 ILON</h2>
  <p>Ovqat yeb katta bo'l!<br>Devorga tegma!</p>
  <div class="final" id="final-score" style="display:none"></div>
  <button class="btn" id="startBtn">BOSHLASH</button>
</div>

<script>
try { window.Telegram.WebApp.ready(); window.Telegram.WebApp.expand(); } catch(e){}

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const CELL = 20;
const COLS = 16, ROWS = 16;
canvas.width = COLS * CELL;
canvas.height = ROWS * CELL;

let snake, dir, food, score, best = 0, running = false, interval;

function init() {
  snake = [{x:8,y:8},{x:7,y:8},{x:6,y:8}];
  dir = {x:1,y:0};
  score = 0;
  document.getElementById('score').textContent = 0;
  placeFood();
  draw();
}

function placeFood() {
  let pos;
  do {
    pos = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)};
  } while (snake.some(s => s.x===pos.x && s.y===pos.y));
  food = pos;
}

function step() {
  const head = {x: snake[0].x+dir.x, y: snake[0].y+dir.y};
  if (head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||snake.some(s=>s.x===head.x&&s.y===head.y)) {
    gameOver(); return;
  }
  snake.unshift(head);
  if (head.x===food.x && head.y===food.y) {
    score++;
    document.getElementById('score').textContent = score;
    if (score>best) { best=score; document.getElementById('best').textContent=best; }
    placeFood();
  } else { snake.pop(); }
  draw();
}

function draw() {
  ctx.fillStyle = '#0a1628';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // Grid
  ctx.strokeStyle = 'rgba(16,185,129,0.05)';
  ctx.lineWidth = 0.5;
  for(let i=0;i<=COLS;i++){ctx.beginPath();ctx.moveTo(i*CELL,0);ctx.lineTo(i*CELL,canvas.height);ctx.stroke();}
  for(let i=0;i<=ROWS;i++){ctx.beginPath();ctx.moveTo(0,i*CELL);ctx.lineTo(canvas.width,i*CELL);ctx.stroke();}

  // Snake
  snake.forEach((s,i) => {
    const alpha = 1 - (i/snake.length)*0.5;
    ctx.fillStyle = i===0 ? '#10b981' : `rgba(16,185,129,${alpha})`;
    ctx.beginPath();
    ctx.roundRect(s.x*CELL+1, s.y*CELL+1, CELL-2, CELL-2, i===0?6:4);
    ctx.fill();
    if(i===0){
      ctx.fillStyle='#000';
      ctx.beginPath(); ctx.arc(s.x*CELL+5,s.y*CELL+5,2,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(s.x*CELL+15,s.y*CELL+5,2,0,Math.PI*2); ctx.fill();
    }
  });

  // Food
  ctx.fillStyle = '#f59e0b';
  ctx.shadowColor='#f59e0b'; ctx.shadowBlur=12;
  ctx.beginPath();
  ctx.arc(food.x*CELL+CELL/2, food.y*CELL+CELL/2, CELL/2-3, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowBlur=0;
}

function gameOver() {
  clearInterval(interval);
  running = false;
  const ov = document.getElementById('overlay');
  ov.querySelector('h2').textContent = '💀 O\'YIN TUGADI';
  document.getElementById('final-score').textContent = 'BALL: '+score;
  document.getElementById('final-score').style.display='block';
  ov.querySelector('p').textContent = 'Yana urinib ko\'ring!';
  document.getElementById('startBtn').textContent = 'QAYTA';
  ov.style.display='flex';
}

document.getElementById('startBtn').addEventListener('click', () => {
  document.getElementById('overlay').style.display='none';
  init();
  running = true;
  clearInterval(interval);
  interval = setInterval(step, 150);
});

// Keyboard
document.addEventListener('keydown', e => {
  if(!running) return;
  if(e.key==='ArrowUp'&&dir.y===0) dir={x:0,y:-1};
  if(e.key==='ArrowDown'&&dir.y===0) dir={x:0,y:1};
  if(e.key==='ArrowLeft'&&dir.x===0) dir={x:-1,y:0};
  if(e.key==='ArrowRight'&&dir.x===0) dir={x:1,y:0};
});

// D-pad
document.getElementById('up').addEventListener('click', ()=>{ if(running&&dir.y===0) dir={x:0,y:-1}; });
document.getElementById('down').addEventListener('click', ()=>{ if(running&&dir.y===0) dir={x:0,y:1}; });
document.getElementById('left').addEventListener('click', ()=>{ if(running&&dir.x===0) dir={x:-1,y:0}; });
document.getElementById('right').addEventListener('click', ()=>{ if(running&&dir.x===0) dir={x:1,y:0}; });

// Swipe
let tx=0,ty=0;
canvas.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
canvas.addEventListener('touchend',e=>{
  if(!running) return;
  const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>Math.abs(dy)){
    if(dx>20&&dir.x===0) dir={x:1,y:0};
    if(dx<-20&&dir.x===0) dir={x:-1,y:0};
  } else {
    if(dy>20&&dir.y===0) dir={x:0,y:1};
    if(dy<-20&&dir.y===0) dir={x:0,y:-1};
  }
},{passive:true});

init();
</script>
</body>
</html>
